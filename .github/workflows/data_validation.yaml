name: Data Validation Pipeline

on:
  push:
    branches:
      - main

jobs:
  validate-data:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Download dataset
      run: |
        mkdir -p data/raw
        curl -L -o data/raw/creditcard.csv https://storage.googleapis.com/download.tensorflow.org/data/creditcard.csv

    - name: Prepare dataset
      run: |
        python scripts/prepare_dataset.py

    - name: Run data quality validation
      run: |
        python data_quality/validation_engine.py

    - name: Run row count monitoring
      run: |
        python monitoring/row_count_monitor.py

    - name: Run data drift detection
      run: |
        python monitoring/data_drift_monitor.py

    - name: Run distribution drift detection
      run: |
        python monitoring/distribution_drift_monitor.py

    - name: Train ML model
      run: |
        python ml/train_model.py

    - name: Evaluate model
      run: |
        python ml/evaluate_model.py

    - name: Run pytest tests
      run: |
        pytest